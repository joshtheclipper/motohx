<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OmniPanel</title>
        <style>
            /* Target the entire page body */
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f4f7f6;
                color: #333;
                max-width: 600px;
                margin: 40px auto; /* Centers the app on the screen */
                padding: 20px;
                background: white;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }

            h1 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
            h2 { color: #34495e; margin-top: 30px; }

            /* Style the input form layout */
            form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }

            input, select, button {
                padding: 10px;
                font-size: 16px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }

            button {
                background-color: #2ecc71;
                color: white;
                border: none;
                cursor: pointer;
                font-weight: bold;
            }
            button:hover { background-color: #27ae60; }

            /* Style the maintenance history list */
            ul { list-style-type: none; padding: 0; }
            li {
                background: #f9f9f9;
                margin-bottom: 8px;
                padding: 12px;
                border-radius: 4px;
                display: flex;
                justify-content: space-between; /* Pushes the delete button to the far right */
                align-items: center;
                border-left: 4px solid #3498db;
            }
        </style>
    </head>

        <h1>OmniPanel: Car Maintenance Tracker</h1>

        <h2> Add New Maintenance</h2>
        <form action="/" method="POST">

            <input type="date" name="date" required>

            <input type="text" name="service" list="service-predictions" placeholder="Service (e.g. Brake Pads)" required autocomplete="off">

            <datalist id="service-predictions">
                {% for service_option in service_options %}
                    <option value="{{ service_option }}">
                {% endfor %}
            </datalist>

            <input type="number" name="mileage" placeholder="Mileage" required>
            <button type="submit">Add Record</button>

        </form>
        <p><strong>Service History:</strong></p>

        <ul>
            {% for log in logs %}
            <li>
                <strong>{{ log.date }}</strong> - {{ log.service}} (miles: {{log.mileage }})
                <form action="/delete/{{ log.id }}" method="POST" style="display:inline;">
                    <button type="submit" style="color: red; margin-left: 10px; cursor: pointer;">remove</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </body>
</html>
